name: Job Outputs Demo

on:
  workflow_dispatch:

jobs:
  date-job:
    runs-on: ubuntu-latest
    outputs:
      today: ${{ steps.set-date.outputs.date }}
    steps:
      - id: set-date
        run: echo "date=$(date)" >> $GITHUB_OUTPUT

  print-job:
    runs-on: ubuntu-latest
    needs: date-job
    steps:
      - name: Print date from previous job
        run: echo "Today's date is ${{ needs.date-job.outputs.today }}"
