name: Smart Pipeline

on:
  push:
    branches: ["*"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Lint code
        run: echo "Linting code..."

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Run tests
        run: echo "Running tests..."

  summary:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Print Summary
        run:
          if [ "${{ github.ref  }}" == "refs/heads/main" ]; then 
            echo "Main branch push"
          else
            echo "Feature branch push"
          fi
          echo "Commit meassage: ${{ github.event.commits[0].message }}"
            
